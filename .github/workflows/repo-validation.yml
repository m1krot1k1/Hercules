name: Repository Validation

permissions: read-all

on:
  pull_request:
  push:

jobs:
  validate-unix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # В CI включаем зеркало: drift даёт предупреждения [mirror], exit 0 (см. docs/canonical-paths-and-cursor-mirror.md).
      - name: Full repo benchmark + mirror drift (--check-mirror)
        run: ./scripts/run-full-repo-benchmark.sh --check-mirror

  validate-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Зеркало включено (как на Unix); ps1 не пробрасывает аргументы — вызываем Python напрямую.
      - name: Full repo benchmark + mirror drift (--check-mirror)
        shell: pwsh
        run: python3 scripts/run-full-repo-benchmark.py --check-mirror
